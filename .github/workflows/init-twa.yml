name: Init TWA Project

on:
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Generate TWA project
        run: |
          mkdir -p android-twa
          cd android-twa

          bubblewrap init \
            --manifest=https://sky-post-clone.lovable.app/manifest.json \
            --directory=. \
            --skipPwaValidation \
            --jdkPath="$JAVA_HOME" \
            --androidSdkPath="$ANDROID_HOME"

      - name: Commit generated project
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add android-twa/
          git commit -m "Generate TWA project [skip ci]" || echo "No changes"
          git push
